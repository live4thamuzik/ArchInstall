name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust checks job - runs clippy and fmt in Arch Linux
  rust-checks:
    name: Rust Checks (Arch Linux)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.1

    - name: Run Rust checks in Arch Linux container
      run: |
        docker run --rm -v "$PWD:/workspace" -w /workspace archlinux:latest bash -c "
          # Update system
          pacman -Syu --noconfirm
          
          # Install Rust and dependencies
          pacman -S --noconfirm git curl wget
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source ~/.cargo/env
          
          # Install Rust components
          rustup component add rustfmt clippy
          
          # Run formatting check
          echo 'Running Rust formatting check...'
          cargo fmt --all -- --check
          
          # Run clippy
          echo 'Running Rust clippy...'
          cargo clippy --all-targets --all-features -- -D warnings
          
          echo 'Rust checks completed successfully!'
        "

  # Test job - runs all tests in Arch Linux
  test:
    name: Run Tests (Arch Linux)
    runs-on: ubuntu-latest
    needs: rust-checks
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.1

    - name: Run tests in Arch Linux container
      run: |
        docker run --rm -v "$PWD:/workspace" -w /workspace archlinux:latest bash -c "
          # Update system
          pacman -Syu --noconfirm
          
          # Install dependencies
          pacman -S --noconfirm git curl wget shellcheck
          
          # Install Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source ~/.cargo/env
          
          # Run Rust tests
          echo 'Running Rust tests...'
          cargo test --verbose --all-features
          
          # Build release binary
          echo 'Building release binary...'
          cargo build --release
          
          # Run shellcheck on scripts
          echo 'Running shellcheck...'
          find . -name '*.sh' -not -path './.git/*' -exec shellcheck {} \;
          
          # Run shell script tests if available
          if [ -f './run_tests.sh' ]; then
            echo 'Running shell script tests...'
            chmod +x ./run_tests.sh
            ./run_tests.sh
          else
            echo 'Test runner not found, skipping shell tests'
          fi
          
          echo 'All tests completed successfully!'
        "

    - name: Upload test artifacts
      uses: actions/upload-artifact@v3.1.2
      if: failure()
      with:
        name: test-results-archlinux
        path: |
          target/debug/
          target/release/archinstall-tui
        retention-days: 7

  # Integration test job - runs in Arch Linux container
  integration-test:
    name: Integration Tests (Arch Linux Container)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.1
    
    - name: Run integration tests in Arch Linux container
      run: |
        # Use Docker to run tests in Arch Linux environment
        docker run --rm -v "$PWD:/workspace" -w /workspace archlinux:latest bash -c "
          # Update system
          pacman -Syu --noconfirm
          
          # Install dependencies
          pacman -S --noconfirm git sudo bash curl wget
          
          # Validate installer scripts can be sourced without errors
          echo 'Testing script syntax...'
          for script in *.sh; do
            if [ -f \"\$script\" ]; then
              echo \"Validating \$script...\"
              bash -n \"\$script\" || exit 1
            fi
          done
          
          # Test YAML parser functionality
          echo 'Testing YAML parser...'
          if [ -f yaml_parser.sh ]; then
            bash -n yaml_parser.sh || exit 1
            # Test with sample config
            if [ -f config.yaml ]; then
              echo 'Testing YAML parsing...'
              source yaml_parser.sh
              if command -v parse_yaml_config >/dev/null 2>&1; then
                echo 'YAML parser function available'
              else
                echo 'YAML parser function not found'
                exit 1
              fi
            fi
          fi
          
          # Test configuration files exist and are valid
          echo 'Validating configuration files...'
          [ -f config.yaml ] || { echo 'config.yaml not found'; exit 1; }
          [ -f config.sh ] || { echo 'config.sh not found'; exit 1; }
          
          # Test that all required scripts are present
          echo 'Checking required scripts...'
          required_scripts=(install_arch.sh chroot_config.sh disk_strategies.sh utils.sh)
          for script in \"\${required_scripts[@]}\"; do
            [ -f \"\$script\" ] || { echo \"Required script \$script not found\"; exit 1; }
            [ -x \"\$script\" ] || chmod +x \"\$script\"
          done
          
          echo 'Integration tests completed successfully!'
        "

  # Security scan job
  security-scan:
    name: Security Scan (Arch Linux)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.1
    
    - name: Run security scan in Arch Linux container
      run: |
        docker run --rm -v "$PWD:/workspace" -w /workspace archlinux:latest bash -c "
          # Update system
          pacman -Syu --noconfirm
          
          # Install security tools
          pacman -S --noconfirm git curl wget
          
          # Install Trivy (if available in AUR)
          # For now, we'll do basic security checks
          echo 'Running basic security checks...'
          
          # Check for hardcoded secrets
          echo 'Checking for potential hardcoded secrets...'
          if grep -r -i 'password\\|secret\\|key\\|token' --include='*.sh' --include='*.rs' --include='*.yaml' . | grep -v '\\$\\|config\\|example'; then
            echo 'Potential hardcoded secrets found!'
            exit 1
          fi
          
          # Check file permissions
          echo 'Checking file permissions...'
          find . -name '*.sh' -not -perm 755 -exec chmod 755 {} \\;
          
          echo 'Security scan completed successfully!'
        "
    
    - name: Run Trivy vulnerability scanner (Ubuntu)
      uses: aquasecurity/trivy-action@0.10.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2.21.9
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Build and package job
  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, integration-test, security-scan]
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.1
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    
    - name: Build release binary
      run: |
        cargo build --release
    
    - name: Create package directory
      run: |
        mkdir -p archinstall-package/usr/bin
        mkdir -p archinstall-package/usr/share/archinstall
        mkdir -p archinstall-package/etc/archinstall
    
    - name: Copy files to package
      run: |
        cp target/release/archinstall-tui archinstall-package/usr/bin/
        cp -r Source/ archinstall-package/usr/share/archinstall/
        cp config.yaml archinstall-package/etc/archinstall/
        cp *.sh archinstall-package/usr/share/archinstall/
        cp README.md LICENSE archinstall-package/usr/share/archinstall/
    
    - name: Create package manifest
      run: |
        cat > archinstall-package/MANIFEST << EOF
        Package: archinstall-tui
        Version: ${{ github.event.release.tag_name }}
        Architecture: x86_64
        Description: Advanced Arch Linux installer with TUI
        Dependencies: bash, util-linux, parted, e2fsprogs
        Files:
          usr/bin/archinstall-tui
          usr/share/archinstall/
          etc/archinstall/config.yaml
        EOF
    
    - name: Create tarball
      run: |
        tar -czf archinstall-${{ github.event.release.tag_name }}.tar.gz -C archinstall-package .
    
    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./archinstall-${{ github.event.release.tag_name }}.tar.gz
        asset_name: archinstall-${{ github.event.release.tag_name }}.tar.gz
        asset_content_type: application/gzip

  # Docker build job
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.1
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.0.0
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5.1.0
      with:
        context: .
        push: true
        tags: |
          archinstall-tui:latest
          archinstall-tui:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Notify job
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, integration-test, security-scan, build-package]
    if: always()
    
    steps:
    - name: Notify success
      if: ${{ needs.test.result == 'success' && needs.integration-test.result == 'success' && needs.security-scan.result == 'success' }}
      run: |
        echo "✅ All tests passed! Build successful."
    
    - name: Notify failure
      if: ${{ needs.test.result == 'failure' || needs.integration-test.result == 'failure' || needs.security-scan.result == 'failure' }}
      run: |
        echo "❌ Tests failed! Build unsuccessful."
        exit 1