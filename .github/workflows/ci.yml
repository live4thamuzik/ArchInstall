name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Test job - runs all tests without requiring sudo
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust-version: [stable, beta, nightly]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.rust-version }}
        profile: minimal
        components: rustfmt, clippy
        override: true
    
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libssl-dev
    
    - name: Run Rust tests
      run: |
        cargo test --verbose --all-features
    
    - name: Run Rust formatting check
      run: |
        cargo fmt --all -- --check
    
    - name: Run Rust clippy
      run: |
        cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Build release binary
      run: |
        cargo build --release
    
    - name: Run shell script tests
      run: |
        ./run_tests.sh
    
    - name: Upload test artifacts
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: test-results-${{ matrix.rust-version }}
        path: |
          target/debug/
          target/release/archinstall-tui
        retention-days: 7

  # Integration test job - runs in Arch Linux VM
  integration-test:
    name: Integration Tests (Arch Linux VM)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install QEMU and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-kvm qemu-utils libvirt-daemon-system libvirt-clients bridge-utils
    
    - name: Download Arch Linux ISO
      run: |
        wget -O archlinux.iso https://geo.mirror.pkgbuild.com/iso/latest/archlinux-x86_64.iso
    
    - name: Create test VM disk
      run: |
        qemu-img create -f qcow2 archinstall-test.qcow2 10G
    
    - name: Start Arch Linux VM for testing
      run: |
        qemu-system-x86_64 \
          -cdrom archlinux.iso \
          -drive file=archinstall-test.qcow2,format=qcow2 \
          -m 2048 \
          -nographic \
          -netdev user,id=net0,hostfwd=tcp::2222-:22 \
          -device e1000,netdev=net0 \
          -boot order=dc &
        sleep 30
    
    - name: Run integration tests in VM
      run: |
        # This would contain actual integration test commands
        echo "Integration tests would run here"
        # Example: ssh -p 2222 root@localhost "cd /mnt && ./archinstall-tui --test"

  # Security scan job
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Build and package job
  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
    
    - name: Build release binary
      run: |
        cargo build --release
    
    - name: Create package directory
      run: |
        mkdir -p archinstall-package/usr/bin
        mkdir -p archinstall-package/usr/share/archinstall
        mkdir -p archinstall-package/etc/archinstall
    
    - name: Copy files to package
      run: |
        cp target/release/archinstall-tui archinstall-package/usr/bin/
        cp -r Source/ archinstall-package/usr/share/archinstall/
        cp config.yaml archinstall-package/etc/archinstall/
        cp *.sh archinstall-package/usr/share/archinstall/
        cp README.md LICENSE archinstall-package/usr/share/archinstall/
    
    - name: Create package manifest
      run: |
        cat > archinstall-package/MANIFEST << EOF
        Package: archinstall-tui
        Version: ${{ github.event.release.tag_name }}
        Architecture: x86_64
        Description: Advanced Arch Linux installer with TUI
        Dependencies: bash, util-linux, parted, e2fsprogs
        Files:
          usr/bin/archinstall-tui
          usr/share/archinstall/
          etc/archinstall/config.yaml
        EOF
    
    - name: Create tarball
      run: |
        tar -czf archinstall-${{ github.event.release.tag_name }}.tar.gz -C archinstall-package .
    
    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./archinstall-${{ github.event.release.tag_name }}.tar.gz
        asset_name: archinstall-${{ github.event.release.tag_name }}.tar.gz
        asset_content_type: application/gzip

  # Docker build job
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          archinstall-tui:latest
          archinstall-tui:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Documentation job
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        components: rust-docs
        override: true
    
    - name: Generate Rust documentation
      run: |
        cargo doc --no-deps --document-private-items
    
    - name: Generate shell script documentation
      run: |
        # Generate documentation from shell scripts
        find . -name "*.sh" -not -path "./.git/*" -exec bash -c '
          echo "# $(basename "$1")" > "${1%.sh}.md"
          echo "" >> "${1%.sh}.md"
          grep "^#" "$1" | sed "s/^# /## /" >> "${1%.sh}.md"
        ' _ {} \;
    
    - name: Upload documentation
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: |
          target/doc/
          *.md
        retention-days: 30

  # Performance benchmark job
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
    
    - name: Install benchmark dependencies
      run: |
        cargo install criterion
    
    - name: Run benchmarks
      run: |
        cargo bench --features benchmark
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: target/criterion/
        retention-days: 30

  # Notify job
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, integration-test, security-scan, build-package]
    if: always()
    
    steps:
    - name: Notify success
      if: ${{ needs.test.result == 'success' && needs.security-scan.result == 'success' }}
      run: |
        echo "✅ All tests passed! Build successful."
    
    - name: Notify failure
      if: ${{ needs.test.result == 'failure' || needs.security-scan.result == 'failure' }}
      run: |
        echo "❌ Tests failed! Build unsuccessful."
        exit 1
