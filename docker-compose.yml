version: '3.8'

services:
  archinstall-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archinstall-dev
    privileged: true
    volumes:
      - .:/app
      - /dev:/dev
      - /proc:/proc
      - /sys:/sys
    environment:
      - TERM=xterm-256color
    stdin_open: true
    tty: true
    command: /bin/bash

  archinstall-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archinstall-test
    privileged: true
    volumes:
      - .:/app
      - /dev:/dev
      - /proc:/proc
      - /sys:/sys
    environment:
      - TERM=xterm-256color
    stdin_open: true
    tty: true
    command: ./run_tests.sh