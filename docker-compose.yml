version: '3.8'

services:
  archinstall-tui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archinstall-tui
    volumes:
      # Mount for testing (read-only)
      - ./tests:/app/tests:ro
      - ./config.yaml:/etc/archinstall/config.yaml:ro
      # Mount for actual installation (if needed)
      - /dev:/dev:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
    devices:
      # Allow access to block devices for disk operations
      - /dev/loop0:/dev/loop0
    privileged: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN  # Required for mount operations
    environment:
      - TERM=xterm-256color
      - ARCHINSTALL_LOG_LEVEL=INFO
    command: ["--help"]
    profiles:
      - test
      - install

  # Test environment
  archinstall-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archinstall-test
    volumes:
      - ./tests:/app/tests
      - ./run_tests.sh:/app/run_tests.sh
      - ./config.yaml:/app/config.yaml
      - test-data:/app/test-data
    environment:
      - TERM=xterm-256color
      - ARCHINSTALL_TEST_MODE=true
    command: ["bash", "-c", "./run_tests.sh"]
    profiles:
      - test

  # Development environment
  archinstall-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archinstall-dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    environment:
      - TERM=xterm-256color
      - RUST_LOG=debug
    command: ["bash"]
    profiles:
      - dev

  # CI/CD test runner
  archinstall-ci:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archinstall-ci
    volumes:
      - .:/app
    environment:
      - TERM=xterm-256color
      - CI=true
      - RUST_BACKTRACE=1
    command: ["bash", "-c", "cargo test && ./run_tests.sh"]
    profiles:
      - ci

volumes:
  test-data:
    driver: local
  cargo-cache:
    driver: local

networks:
  default:
    name: archinstall-network
