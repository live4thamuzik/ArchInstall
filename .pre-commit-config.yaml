# Pre-commit hooks configuration for archinstall-tui
# Install with: pip install pre-commit && pre-commit install

repos:
  # Rust formatting and linting
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: rustfmt
        description: Format Rust code
        args: [--edition, "2021"]
      - id: clippy
        name: clippy
        description: Lint Rust code
        args: [--all-targets, --all-features, --, -D, warnings]
      - id: cargo-check
        name: cargo check
        description: Check Rust code compiles

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Lint shell scripts
        args: [--severity=warning]
        files: \.(sh|bash)$

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        description: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Fix End of Files
        description: Ensure files end with newline
      - id: check-yaml
        name: Check YAML
        description: Validate YAML syntax
        files: \.(yaml|yml)$
      - id: check-json
        name: Check JSON
        description: Validate JSON syntax
        files: \.(json)$
      - id: check-toml
        name: Check TOML
        description: Validate TOML syntax
        files: \.(toml)$
      - id: check-merge-conflict
        name: Check for merge conflicts
        description: Check for merge conflict markers
      - id: check-added-large-files
        name: Check for large files
        description: Prevent large files from being committed
        args: [--maxkb=1000]
      - id: check-case-conflict
        name: Check for case conflicts
        description: Check for case conflicts in filenames
      - id: mixed-line-ending
        name: Mixed Line Ending
        description: Ensure consistent line endings
        args: [--fix=lf]

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        description: Prevent secrets from being committed
        args: ['--baseline', '.secrets.baseline']

  # Documentation checks
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        name: pydocstyle
        description: Check Python docstring conventions
        files: \.py$
        args: [--convention=google]

  # License header check
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.4
    hooks:
      - id: insert-license
        name: Insert license header
        description: Insert license header in source files
        args: [--license-filepath, LICENSE]
        files: \.(rs|sh|py|js|ts)$

  # Custom hooks
  - repo: local
    hooks:
      - id: archinstall-tests
        name: Run archinstall tests
        description: Run Rust and shell tests
        entry: bash -c "cargo test && ./run_tests.sh"
        language: system
        pass_filenames: false
        always_run: true

      - id: archinstall-build
        name: Build archinstall
        description: Build the release binary
        entry: bash -c "cargo build --release"
        language: system
        pass_filenames: false
        always_run: true

      - id: shell-script-tests
        name: Shell script tests
        description: Run shell script tests
        entry: bash -c "./tests/run_shell_tests.sh"
        language: system
        files: \.(sh|bash)$

      - id: rust-doc
        name: Rust documentation
        description: Generate and check Rust documentation
        entry: bash -c "cargo doc --no-deps"
        language: system
        files: \.(rs)$

# Configuration
default_stages: [commit]
minimum_pre_commit_version: 3.0.0
fail_fast: false
exclude: |
  (?x)^(
      \.git/.*|
      target/.*|
      \.cargo/.*|
      \.vscode/.*|
      \.idea/.*|
      node_modules/.*|
      \.DS_Store.*|
      Thumbs\.db.*
  )$
